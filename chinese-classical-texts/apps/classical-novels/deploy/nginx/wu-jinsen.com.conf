# wu-jinsen.com 站点合集
#   moli-ui.wu-jinsen.com          → /opt/moli/frontend/dist + 后端 8888
#   bioscope3d.wu-jinsen.com       → /opt/bioscope3d/page-dist
#   chinese-classical-texts.wu-jinsen.com → /opt/chinese-classical-texts/dist
#
# 部署：
#   sudo cp deploy/nginx/wu-jinsen.com.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/wu-jinsen.com.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

upstream moli_backend {
    server 127.0.0.1:8888;
    keepalive 32;
}

server {
    listen 80 default_server;
    server_name moli-ui.wu-jinsen.com;

    root /opt/moli/frontend/dist;
    index index.html;

    error_page 405 = @moli_backend;
    error_page 419 = @login_spa;

    location = /login {
        if ($request_method = POST) {
            return 405;
        }
        return 419;
    }

    location = /system-select {
        return 419;
    }

    # 关键：跳到 /，不要跳到 /index.html
    location @login_spa {
        rewrite ^ / last;
    }

    location @moli_backend {
        proxy_pass http://moli_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header token $http_token;
        proxy_set_header Accept-Language $http_accept_language;
    }

    location ~ ^/(logout|captchaImage|menu|user|system|sso|dept|post|role|action|auth|dict|log|operation|cockpit|bi|persona)(/|$) {
        set $spa_fallback 0;
        if ($request_method ~ ^(GET|HEAD)$) {
            set $spa_fallback 1;
        }
        if ($http_accept ~* text/html) {
            set $spa_fallback "${spa_fallback}1";
        }
        if ($spa_fallback = 11) {
            return 419;
        }

        proxy_pass http://moli_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header token $http_token;
        proxy_set_header Accept-Language $http_accept_language;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name bioscope3d.wu-jinsen.com;

    root /opt/bioscope3d/page-dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?|wasm|mp4|webm|json|glb|gltf)$ {
        expires 7d;
        access_log off;
    }
}

server {
    listen 80;
    server_name chinese-classical-texts.wu-jinsen.com;

    root /opt/chinese-classical-texts/dist;
    index index.html;

    # 403 排查：tail -f /var/log/nginx/error.log
    #   「directory index ... is forbidden」→ dist 缺 index.html，需完整 npm run build 后 rsync
    #   正确：bash deploy/deploy.sh  或  rsync -av --delete dist/ /opt/chinese-classical-texts/dist/

    # Astro 静态站：每路由有独立 index.html，不用 SPA 回退
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?|wasm|json)$ {
        expires 7d;
        access_log off;
    }
}
